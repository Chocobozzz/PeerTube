@if (account().mutedByUser) {
  <span class="pt-badge badge-danger" i18n>Muted</span>
}

@if (account().mutedServerByUser) {
  <span class="pt-badge badge-danger" i18n>Platform muted</span>
}

@if (account().mutedByInstance) {
  <span class="pt-badge badge-danger" i18n>Muted by your platform</span>
}

@if (account().mutedServerByInstance) {
  <span class="pt-badge badge-danger" i18n>Platform muted by your platform</span>
}

<ng-template #modal>
  <div class="modal-header">
    <h4 i18n class="modal-title">{{ getModalTitle() }}</h4>

    <button class="border-0 p-0" title="Close this modal" i18n-title (click)="hide()">
      <my-global-icon iconName="cross"></my-global-icon>
    </button>
  </div>

  <div class="modal-body">
    <form novalidate [formGroup]="form" (ngSubmit)="save()">
      <div class="form-group">
        <textarea
          i18n-placeholder placeholder="Internal note..." formControlName="internalNote"
          class="form-control" [ngClass]="{ 'input-error': formErrors['internalNote'] }"
        ></textarea>

        @if (formErrors.internalNote) {
          <div class="form-error" role="alert">{{ formErrors.internalNote }}</div>
        }
      </div>

      <div class="form-group inputs">
        <input
          type="button" role="button" i18n-value value="Cancel" class="peertube-button secondary-button"
          (click)="hide()" (key.enter)="hide()"
        >

        <input type="submit" i18n-value value="Save" class="peertube-button primary-button" [disabled]="!form.valid" />
      </div>
    </form>
  </div>
</ng-template>

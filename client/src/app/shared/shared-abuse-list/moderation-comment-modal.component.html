<ng-template #modal>
  <div class="modal-header">
    <h4 class="modal-title">{{ getModalTitle() }}</h4>

    <button class="border-0 p-0" title="Close this modal" i18n-title (click)="hide()">
      <my-global-icon iconName="cross"></my-global-icon>
    </button>
  </div>

  <div class="modal-body">
    <form novalidate [formGroup]="form" (ngSubmit)="banUser()">
      <div class="form-group">
        <textarea
          formControlName="moderationComment" ngbAutofocus i18-placeholder placeholder="Comment this report…"
          [ngClass]="{ 'input-error': formErrors['moderationComment'] }" class="form-control">
        </textarea>

        @if (formErrors.moderationComment) {
          <div class="form-error" role="alert">
            {{ formErrors.moderationComment }}
          </div>
        }
      </div>

      <div class="form-group">
        @if (hasMultipleAbuses()) {
          <ng-container i18n>This comment will be set on all selected reports and can only be seen by moderators.</ng-container>
        } @else {
          <ng-container i18n>This comment can only be seen by you or the other moderators.</ng-container>
        }
      </div>

      <div class="form-group inputs">
        <input
          type="button" role="button" i18n-value value="Cancel" class="peertube-button secondary-button"
          (click)="hide()" (key.enter)="hide()"
          >

        <input type="submit" [value]="getSubmitLabel()" class="peertube-button primary-button" [disabled]="!form.valid" />
      </div>
    </form>
  </div>

</ng-template>

patchedDependencies:
  '@types/markdown-it': pnpm-patches/@types__markdown-it.patch
  sharp: pnpm-patches/sharp.patch
  tinykeys: pnpm-patches/tinykeys.patch
  video.js: pnpm-patches/video.js.patch
